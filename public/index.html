<!DOCTYPE html>
<html>
<head>
    <title>Gems Casino: 21</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; text-align: center; }
        .hidden { display: none; }
        .card { display: inline-block; width: 45px; height: 65px; background: white; color: black; border-radius: 5px; margin: 5px; line-height: 65px; font-weight: bold; }
        .btn { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; margin: 5px; }
        .btn-green { background: #28a745; color: white; }
        .btn-blue { background: #007bff; color: white; }
        #dealer-area { background: #16213e; padding: 20px; border-radius: 10px; margin: 10px; }
    </style>
</head>
<body>
    <div id="auth-screen">
        <h1>Gems Casino</h1>
        <input id="username" placeholder="Username"><br><br>
        <input id="password" type="password" placeholder="Password"><br><br>
        <button class="btn btn-green" onclick="auth()">Login / Register</button>
    </div>

    <div id="lobby" class="hidden">
        <h2>Welcome, <span id="userDisplay"></span>!</h2>
        <h3>Gems: <span id="gemDisplay"></span> 💎</h3>
        <input id="roomInput" placeholder="Room Name">
        <button class="btn btn-blue" onclick="join(document.getElementById('roomInput').value)">Create/Join Room</button>
        <div id="roomList"></div>
    </div>

    <div id="gameArea" class="hidden">
        <div id="dealer-area">
            <h3>Dealer</h3>
            <div id="dealerCards"></div>
            <p>Score: <span id="dealerScore">?</span></p>
        </div>

        <div id="betting-controls" class="hidden">
            <h3>Place your Bet</h3>
            <button class="btn btn-green" onclick="bet(10)">Bet 10</button>
            <button class="btn btn-green" onclick="bet(25)">Bet 25</button>
            <button class="btn btn-green" onclick="bet(50)">Bet 50</button>
        </div>

        <div id="action-controls" class="hidden">
            <button class="btn btn-blue" onclick="hit()">Hit</button>
            <button class="btn btn-green" onclick="stand()">Stand</button>
        </div>

        <div id="players"></div>
    </div>

    <script>
        const socket = io();
        let currentRoom = "";

        function auth() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            socket.emit('auth', { username: u, password: p });
        }

        socket.on('authSuccess', (data) => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('userDisplay').innerText = data.username;
            document.getElementById('gemDisplay').innerText = data.gems;
        });

        socket.on('updateBalance', (gems) => {
            document.getElementById('gemDisplay').innerText = gems;
        });

        function join(room) {
            currentRoom = room;
            socket.emit('joinRoom', room);
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('gameArea').classList.remove('hidden');
        }

        function bet(amt) { socket.emit('placeBet', { roomId: currentRoom, amount: amt }); }
        function hit() { socket.emit('hit', currentRoom); }
        function stand() { socket.emit('stand', currentRoom); }

        socket.on('updateGame', (room) => {
            // Show/Hide buttons based on phase
            document.getElementById('betting-controls').style.display = room.phase === 'betting' ? 'block' : 'none';
            document.getElementById('action-controls').style.display = room.phase === 'playing' ? 'block' : 'none';

            // Render Dealer
            document.getElementById('dealerCards').innerHTML = room.dealer.hand.map(c => `<div class="card">${c.value}${c.suit}</div>`).join('');
            document.getElementById('dealerScore').innerText = room.dealer.score;

            // Render Players
            document.getElementById('players').innerHTML = room.players.map(p => `
                <div>
                    <h4>${p.name}</h4>
                    <p>Bet: ${p.bet} | Score: ${p.score} (${p.status})</p>
                    ${p.hand.map(c => `<div class="card">${c.value}${c.suit}</div>`).join('')}
                </div>
            `).join('');
        });
    </script>
</body>
</html>
