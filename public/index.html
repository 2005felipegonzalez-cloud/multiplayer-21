<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ROYAL GEM CASINO</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0f1218; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--dark); color: #e0e0e0; font-family: 'Poppins', sans-serif; margin: 0; text-align: center; }
        .hidden { display: none !important; }
        .panel { background: var(--glass); border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 20px; padding: 25px; margin: 15px; backdrop-filter: blur(10px); }
        h1, h2 { font-family: 'Cinzel', serif; color: var(--gold); }
        .card { width: 55px; height: 85px; background: white; color: black; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; margin: 3px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card.back { background: #222; border: 1px solid var(--gold); }
        .btn { padding: 10px 25px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; text-transform: uppercase; margin: 5px; border: 1px solid var(--gold); background: transparent; color: var(--gold); }
        .btn:hover:not(:disabled) { background: var(--gold); color: black; }
        .btn-exit { border-color: #ff4d4d; color: #ff4d4d; margin-top: 20px; }
        .table-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; padding: 20px; }
        .table-card { padding: 25px; border-radius: 15px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .table-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        #timer-display { font-size: 1.5rem; color: #ff4d4d; font-weight: bold; height: 35px; }
    </style>
</head>
<body>
    <div id="auth-screen" style="margin-top:100px;">
        <h1>ROYAL GEM</h1>
        <div class="panel" style="max-width:350px; margin:auto;">
            <input id="username" placeholder="USERNAME" style="width:80%; padding:10px; margin:10px; background:#1a1a1a; color:white; border:1px solid #333;">
            <input id="password" type="password" placeholder="PASSWORD" style="width:80%; padding:10px; margin:10px; background:#1a1a1a; color:white; border:1px solid #333;">
            <button class="btn" onclick="auth()">ENTER CASINO</button>
        </div>
    </div>

    <div id="lobby" class="hidden">
        <div class="panel" style="display:inline-block;">💎 BALANCE: <span id="gemDisplay" style="color:var(--gold)">0</span></div>
        <br>
        <button class="btn" onclick="socket.emit('claimDaily')">🎁 CLAIM DAILY BONUS</button>
        <h2>CHOOSE A TABLE</h2>
        <div id="roomList" class="table-grid"></div>
    </div>

    <div id="gameArea" class="hidden">
        <div id="timer-display"></div>
        <div class="panel">
            <h3 style="color:var(--gold); margin:0;">HOUSE</h3>
            <div id="dealerCards" style="min-height:95px;"></div>
            <p>Score: <span id="dealerScore">?</span></p>
        </div>

        <h2 id="phaseMessage" style="color:var(--gold); height:30px;"></h2>

        <div id="betting-controls" class="hidden">
            <p id="tableLimit" style="font-size:0.8rem; opacity:0.6;"></p>
            <button class="btn bet-btn" onclick="bet(25)">25</button>
            <button class="btn bet-btn" onclick="bet(100)">100</button>
            <button class="btn bet-btn" onclick="bet(500)">500</button>
            <button class="btn bet-btn" onclick="bet(myGems)">ALL IN</button>
        </div>

        <div id="action-controls" class="hidden">
            <button class="btn" onclick="hit()">HIT</button>
            <button class="btn" onclick="stand()">STAND</button>
        </div>

        <div id="players" style="margin-top:20px;"></div>
        
        <button class="btn btn-exit" onclick="exitToLobby()">QUIT TABLE</button>
    </div>

    <script>
        const socket = io();
        let currentRoom = "", myGems = 0, currentMin = 0;

        function auth() {
            socket.emit('auth', { username: document.getElementById('username').value, password: document.getElementById('password').value });
        }

        socket.on('authSuccess', (data) => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
            myGems = data.gems;
            document.getElementById('gemDisplay').innerText = data.gems;
        });

        socket.on('notification', (msg) => { alert(msg); });

        socket.on('roomList', (rooms) => {
            document.getElementById('roomList').innerHTML = rooms.map(r => `
                <div class="table-card" onclick="join('${r.name}', ${r.min})">
                    <div style="font-weight:bold; font-size:1.2rem; color:var(--gold);">${r.name.toUpperCase()}</div>
                    <div style="font-size:0.8rem; opacity:0.6;">MIN BET: ${r.min} 💎</div>
                </div>`).join('');
        });

        socket.on('timerUpdate', (s) => {
            document.getElementById('timer-display').innerText = s > 0 ? `DEALING IN: ${s}s` : "";
        });

        socket.on('updateBalance', (g) => { 
            myGems = g; 
            document.getElementById('gemDisplay').innerText = g; 
            updateBetButtons();
        });

        function updateBetButtons() {
            document.querySelectorAll('.bet-btn').forEach(btn => {
                const val = btn.innerText === "ALL IN" ? myGems : parseInt(btn.innerText);
                btn.disabled = (val > myGems || val < currentMin);
            });
        }

        function join(name, min) { 
            currentRoom = name; 
            currentMin = min;
            document.getElementById('tableLimit').innerText = `TABLE MINIMUM: ${min} GEMS`;
            socket.emit('joinRoom', name); 
            document.getElementById('lobby').classList.add('hidden'); 
            document.getElementById('gameArea').classList.remove('hidden'); 
        }

        function exitToLobby() {
            socket.emit('leaveRoom', currentRoom);
            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
        }

        function bet(a) { socket.emit('placeBet', { roomId: currentRoom, amount: a }); }
        function hit() { socket.emit('hit', currentRoom); }
        function stand() { socket.emit('stand', currentRoom); }

        socket.on('updateGame', (room) => {
            updateBetButtons();
            document.getElementById('betting-controls').classList.toggle('hidden', room.phase !== 'betting');
            document.getElementById('action-controls').classList.toggle('hidden', room.phase !== 'playing');
            document.getElementById('phaseMessage').innerText = room.phase.toUpperCase();

            let dHtml = room.dealer.hand.map((c, i) => (room.phase === 'playing' && i === 1) ? `<div class="card back">?</div>` : `<div class="card">${c.value}${c.suit}</div>`).join('');
            document.getElementById('dealerCards').innerHTML = dHtml;
            document.getElementById('dealerScore').innerText = room.phase === 'playing' ? "??" : calculateScore(room.dealer.hand);

            document.getElementById('players').innerHTML = room.players.map(p => `
                <div style="display:inline-block; margin:10px; padding:15px; background:rgba(255,255,255,0.05); border-radius:15px; border-bottom:2px solid var(--gold);">
                    <div style="font-size:0.8rem; color:var(--gold);">${p.name.toUpperCase()}</div>
                    <div style="font-weight:bold;">${p.status === 'playing' ? p.score : p.status.toUpperCase()}</div>
                    ${p.hand.map(c => `<div class="card">${c.value}${c.suit}</div>`).join('')}
                    <div style="font-size:0.7rem; opacity:0.6;">BET: ${p.bet} 💎</div>
                </div>
            `).join('');
        });

        function calculateScore(hand) {
            let s = 0, a = 0;
            hand.forEach(c => { if (['J','Q','K'].includes(c.value)) s += 10; else if (c.value === 'A') { a++; s += 11; } else s += parseInt(c.value); });
            while (s > 21 && a > 0) { s -= 10; a--; }
            return s;
        }
    </script>
</body>
</html>
