<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROYAL GEM CASINO</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4a853;
            --gold-light: #f0c97a;
            --gold-dim: rgba(212,168,83,0.15);
            --dark: #080b10;
            --surface: #0e1420;
            --surface2: #141c2b;
            --red: #e05252;
            --green: #52c97a;
            --text: #d0cfc8;
            --text-dim: rgba(208,207,200,0.45);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                repeating-linear-gradient(45deg, rgba(212,168,83,0.015) 0px, rgba(212,168,83,0.015) 1px, transparent 1px, transparent 40px),
                repeating-linear-gradient(-45deg, rgba(212,168,83,0.015) 0px, rgba(212,168,83,0.015) 1px, transparent 1px, transparent 40px);
            pointer-events: none;
            z-index: 0;
        }

        .hidden { display: none !important; }

        /* ── AUTH ── */
        #auth-screen {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .casino-logo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 0.1em;
            text-shadow: 0 0 60px rgba(212,168,83,0.4);
            line-height: 1;
        }

        .casino-subtitle {
            font-size: 0.7rem;
            letter-spacing: 0.5em;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 8px;
            margin-bottom: 50px;
        }

        .auth-box {
            background: var(--surface);
            border: 1px solid rgba(212,168,83,0.2);
            border-radius: 16px;
            padding: 40px 35px;
            width: 100%;
            max-width: 380px;
            position: relative;
        }

        .auth-box::before {
            content: '';
            position: absolute;
            top: -1px; left: 20px; right: 20px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--dark);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus { border-color: rgba(212,168,83,0.5); }

        .btn-primary {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: linear-gradient(135deg, #c49a3a, #e8c56a, #c49a3a);
            border: none;
            border-radius: 8px;
            color: #1a1005;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        /* ── LOBBY ── */
        #lobby {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .lobby-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .lobby-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--gold);
            letter-spacing: 0.05em;
        }

        .balance-pill {
            background: var(--surface);
            border: 1px solid rgba(212,168,83,0.25);
            border-radius: 50px;
            padding: 10px 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .balance-pill span { color: var(--gold); font-weight: 600; font-size: 1rem; }

        .btn-daily {
            padding: 10px 22px;
            background: transparent;
            border: 1px solid rgba(212,168,83,0.35);
            border-radius: 50px;
            color: var(--gold);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.05em;
        }

        .btn-daily:hover { background: var(--gold-dim); }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .table-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }

        .table-card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 28px;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .table-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(212,168,83,0.06), transparent 70%);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .table-card:hover { border-color: rgba(212,168,83,0.4); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
        .table-card:hover::after { opacity: 1; }

        .table-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .table-fee {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
        }

        .table-players {
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .table-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .badge-low { background: rgba(82,201,122,0.15); color: var(--green); border: 1px solid rgba(82,201,122,0.25); }
        .badge-mid { background: rgba(212,168,83,0.15); color: var(--gold); border: 1px solid rgba(212,168,83,0.25); }
        .badge-high { background: rgba(224,82,82,0.15); color: var(--red); border: 1px solid rgba(224,82,82,0.25); }

        /* ── GAME AREA ── */
        #gameArea {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .game-room-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--gold);
        }

        .game-balance {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .game-balance strong { color: var(--gold); }

        .btn-exit {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid rgba(224,82,82,0.35);
            border-radius: 50px;
            color: var(--red);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.05em;
        }

        .btn-exit:hover { background: rgba(224,82,82,0.1); }

        /* Timer */
        .timer-bar-wrap {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 12px 20px;
            text-align: center;
            margin-bottom: 16px;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .timer-label { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; }
        .timer-count { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--red); min-width: 2ch; }
        .timer-count.safe { color: var(--green); }

        /* Dealer zone */
        .dealer-zone {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
        }

        .zone-label {
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .score-badge {
            display: inline-block;
            padding: 3px 12px;
            background: var(--gold-dim);
            border: 1px solid rgba(212,168,83,0.3);
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--gold);
            margin-top: 10px;
        }

        /* Cards */
        .cards-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            min-height: 90px;
            align-items: center;
        }

        .card {
            width: 58px;
            height: 90px;
            background: #fff;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            position: relative;
            color: #1a1a1a;
            animation: dealCard 0.25s ease-out;
        }

        @keyframes dealCard {
            from { opacity: 0; transform: translateY(-12px) scale(0.9); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card.red-suit { color: #c0392b; }
        .card.card-back {
            background: linear-gradient(135deg, #0e1a2e, #1c2d4a);
            border: 2px solid rgba(212,168,83,0.4);
            color: var(--gold);
            font-size: 1.4rem;
        }

        /* Phase message */
        .phase-banner {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            text-transform: uppercase;
            padding: 10px;
            min-height: 36px;
        }

        /* Action buttons */
        .action-zone {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 14px 40px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid;
        }

        .btn-hit {
            background: rgba(82,201,122,0.12);
            border-color: rgba(82,201,122,0.5);
            color: var(--green);
        }

        .btn-hit:hover { background: rgba(82,201,122,0.22); transform: translateY(-1px); }

        .btn-stand {
            background: rgba(212,168,83,0.12);
            border-color: rgba(212,168,83,0.5);
            color: var(--gold);
        }

        .btn-stand:hover { background: rgba(212,168,83,0.22); transform: translateY(-1px); }

        /* Players grid */
        #players-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            flex: 1;
        }

        .player-card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            min-width: 160px;
            transition: border-color 0.3s;
        }

        .player-card.is-me { border-color: rgba(212,168,83,0.4); }
        .player-card.win  { border-color: rgba(82,201,122,0.5); animation: flashWin 0.4s ease; }
        .player-card.lose { border-color: rgba(224,82,82,0.4); }
        .player-card.push { border-color: rgba(212,168,83,0.4); }

        @keyframes flashWin {
            0%, 100% { box-shadow: none; }
            50% { box-shadow: 0 0 30px rgba(82,201,122,0.3); }
        }

        .player-name {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .player-name.me { color: var(--gold); }

        .player-status {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            min-height: 20px;
        }

        .status-playing { color: var(--text); }
        .status-stood  { color: var(--gold-light); }
        .status-bust   { color: var(--red); }
        .status-win    { color: var(--green); }
        .status-push   { color: var(--gold); }
        .status-spectating { color: var(--text-dim); font-style: italic; }
        .status-waiting    { color: var(--text-dim); }
        .status-ready      { color: var(--text-dim); }

        .player-bet {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 8px;
        }

        /* Toast notifications */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface2);
            border: 1px solid rgba(212,168,83,0.3);
            border-radius: 50px;
            padding: 12px 24px;
            font-size: 0.85rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            white-space: nowrap;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Result overlay */
        .result-label {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .result-win  { background: rgba(82,201,122,0.2); color: var(--green); }
        .result-lose { background: rgba(224,82,82,0.2); color: var(--red); }
        .result-push { background: rgba(212,168,83,0.15); color: var(--gold); }
    </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
    <div class="casino-logo">ROYAL GEM</div>
    <div class="casino-subtitle">Casino &nbsp;·&nbsp; Blackjack</div>
    <div class="auth-box">
        <div class="form-group">
            <label>Username</label>
            <input id="username" placeholder="Enter username" autocomplete="off">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input id="password" type="password" placeholder="Enter password">
        </div>
        <button class="btn-primary" onclick="auth()">ENTER CASINO</button>
    </div>
</div>

<!-- LOBBY -->
<div id="lobby" class="hidden">
    <div class="lobby-header">
        <div class="lobby-logo">Royal Gem</div>
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
            <button class="btn-daily" onclick="socket.emit('claimDaily')">🎁 Daily Bonus</button>
            <div class="balance-pill">💎 <span id="gemDisplay">0</span></div>
        </div>
    </div>
    <div class="section-title">Choose Your Table</div>
    <div id="roomList" class="table-grid"></div>
</div>

<!-- GAME -->
<div id="gameArea" class="hidden">
    <div class="game-header">
        <div class="game-room-name" id="gameRoomName">—</div>
        <div class="game-balance">Balance: <strong id="gameGemDisplay">0</strong> 💎</div>
        <button class="btn-exit" onclick="exitToLobby()">← Leave Table</button>
    </div>

    <div class="timer-bar-wrap" id="timerWrap">
        <div class="timer-label" id="timerLabel">Waiting for players</div>
        <div class="timer-count safe" id="timerCount" style="display:none;"></div>
    </div>

    <div class="dealer-zone">
        <div class="zone-label">Dealer</div>
        <div class="cards-row" id="dealerCards"></div>
        <div class="score-badge" id="dealerScore">?</div>
    </div>

    <div class="phase-banner" id="phaseBanner"></div>

    <div class="action-zone hidden" id="action-controls">
        <button class="btn-action btn-hit" onclick="hit()">Hit</button>
        <button class="btn-action btn-stand" onclick="stand()">Stand</button>
    </div>

    <div id="players-area"></div>
</div>

<div id="toast"></div>

<script>
    const socket = io();
    let currentRoom = '';
    let myUsername = '';
    let myGems = 0;

    // ── AUTH
    function auth() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) return showToast('Enter username and password');
        socket.emit('auth', { username, password });
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            if (!document.getElementById('auth-screen').classList.contains('hidden')) auth();
        }
    });

    socket.on('authSuccess', ({ username, gems }) => {
        myUsername = username;
        myGems = gems;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('lobby').classList.remove('hidden');
        document.getElementById('gemDisplay').innerText = gems;
        document.getElementById('gameGemDisplay').innerText = gems;
    });

    socket.on('roomList', (rooms) => {
        const badges = ['badge-low', 'badge-mid', 'badge-high'];
        const badgeLabels = ['Standard', 'High Stakes', 'VIP'];
        document.getElementById('roomList').innerHTML = rooms.map((r, i) => `
            <div class="table-card" onclick="join('${r.name}')">
                <div class="table-badge ${badges[i] || 'badge-mid'}">${badgeLabels[i] || 'Table'}</div>
                <div class="table-name">${r.name}</div>
                <div class="table-fee">Entry: ${r.fee} 💎 per round</div>
                <div class="table-players">${r.players} player${r.players !== 1 ? 's' : ''} at table</div>
            </div>`).join('');
    });

    // ── NOTIFICATIONS
    socket.on('notification', showToast);

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3200);
    }

    // ── BALANCE
    socket.on('updateBalance', (g) => {
        myGems = g;
        document.getElementById('gemDisplay').innerText = g;
        document.getElementById('gameGemDisplay').innerText = g;
    });

    // ── TIMER
    socket.on('timerUpdate', (s) => {
        const label = document.getElementById('timerLabel');
        const count = document.getElementById('timerCount');
        if (s <= 0) {
            label.innerText = 'Dealing cards...';
            count.style.display = 'none';
        } else {
            label.innerText = 'Next round starts in';
            count.style.display = 'block';
            count.innerText = s;
            count.className = 'timer-count ' + (s <= 5 ? '' : 'safe');
        }
    });

    // ── ROUND RESULT
    socket.on('roundResult', ({ outcome, score, dealerScore }) => {
        if (outcome === 'win') showToast(`🏆 You win! Your ${score} beat dealer's ${dealerScore}`);
        else if (outcome === 'push') showToast(`🤝 Push! Both scored ${score}`);
        else showToast(`💸 Dealer wins with ${dealerScore}`);
    });

    // ── JOIN / LEAVE
    function join(name) {
        currentRoom = name;
        document.getElementById('gameRoomName').innerText = name;
        socket.emit('joinRoom', name);
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        // Reset timer display
        document.getElementById('timerLabel').innerText = 'Joining table...';
        document.getElementById('timerCount').style.display = 'none';
    }

    function exitToLobby() {
        socket.emit('leaveRoom', currentRoom);
        document.getElementById('gameArea').classList.add('hidden');
        document.getElementById('lobby').classList.remove('hidden');
        document.getElementById('players-area').innerHTML = '';
        document.getElementById('dealerCards').innerHTML = '';
        currentRoom = '';
    }

    // ── GAME ACTIONS
    function hit()   { socket.emit('hit', currentRoom); }
    function stand() { socket.emit('stand', currentRoom); }

    // ── GAME STATE
    socket.on('updateGame', (room) => {
        // Phase banner
        const banner = document.getElementById('phaseBanner');
        if (room.phase === 'betting') banner.innerText = 'Waiting for players...';
        else if (room.phase === 'playing') banner.innerText = '';
        else if (room.phase === 'results') banner.innerText = 'Round over';
        else banner.innerText = '';

        // Timer label when in betting with no explicit timer event
        if (room.phase === 'betting') {
            document.getElementById('timerLabel').innerText = 'Waiting for players';
            document.getElementById('timerCount').style.display = 'none';
        } else if (room.phase === 'playing') {
            document.getElementById('timerLabel').innerText = 'Round in progress';
            document.getElementById('timerCount').style.display = 'none';
        } else if (room.phase === 'results') {
            document.getElementById('timerLabel').innerText = 'Next round starting soon...';
            document.getElementById('timerCount').style.display = 'none';
        }

        // Dealer cards
        const dealerCards = room.dealer.hand.map((c, i) => {
            if (room.phase === 'playing' && i === 1) return cardHTML({ value: '?', suit: '' }, true);
            return cardHTML(c);
        }).join('');
        document.getElementById('dealerCards').innerHTML = dealerCards || '<span style="color:var(--text-dim); font-size:0.8rem;">Waiting...</span>';

        // Dealer score
        const ds = document.getElementById('dealerScore');
        if (room.phase === 'playing') ds.innerText = '??';
        else if (room.dealer.hand.length) ds.innerText = calculateScore(room.dealer.hand);
        else ds.innerText = '?';

        // My player
        const me = room.players.find(p => p.name === myUsername);

        // Action controls — show only if I'm actively playing
        const showActions = me && me.status === 'playing' && room.phase === 'playing';
        document.getElementById('action-controls').classList.toggle('hidden', !showActions);

        // Players
        document.getElementById('players-area').innerHTML = room.players.map(p => {
            const isMe = p.name === myUsername;
            let statusClass = 'status-' + p.status;
            let statusText = p.status;
            let outcomeLabel = '';

            if (room.phase === 'results' && p.outcome) {
                statusClass = 'status-' + p.outcome;
                statusText = p.outcome === 'win' ? `WIN (${p.score})` : p.outcome === 'push' ? `PUSH (${p.score})` : `LOSE (${p.score})`;
                outcomeLabel = `<div class="result-label result-${p.outcome}">${p.outcome === 'win' ? '+ Gems' : p.outcome === 'push' ? 'Returned' : 'Lost'}</div>`;
            } else if (p.status === 'playing') {
                statusText = `Score: ${p.score}`;
            } else if (p.status === 'stood') {
                statusText = `Stood: ${p.score}`;
            } else if (p.status === 'bust') {
                statusText = `Bust: ${p.score}`;
            } else if (p.status === 'spectating') {
                statusText = 'Spectating';
            } else if (p.status === 'ready') {
                statusText = 'Ready';
            } else if (p.status === 'waiting') {
                statusText = 'Waiting';
            }

            const cardsHtml = p.hand.map(c => cardHTML(c)).join('');

            return `<div class="player-card ${isMe ? 'is-me' : ''} ${p.outcome || ''}">
                <div class="player-name ${isMe ? 'me' : ''}">${isMe ? '⭐ ' : ''}${p.name}</div>
                <div class="player-status ${statusClass}">${statusText}</div>
                <div class="cards-row">${cardsHtml || '<span style="color:var(--text-dim);font-size:0.75rem;">No cards</span>'}</div>
                ${p.bet > 0 ? `<div class="player-bet">Stake: ${p.bet} 💎</div>` : ''}
                ${outcomeLabel}
            </div>`;
        }).join('');
    });

    function cardHTML(card, isBack = false) {
        if (isBack) return `<div class="card card-back">♦</div>`;
        const redSuits = ['♥', '♦'];
        const cls = redSuits.includes(card.suit) ? 'red-suit' : '';
        return `<div class="card ${cls}">${card.value}${card.suit}</div>`;
    }

    function calculateScore(hand) {
        let s = 0, a = 0;
        hand.forEach(c => {
            if (['J','Q','K'].includes(c.value)) s += 10;
            else if (c.value === 'A') { a++; s += 11; }
            else s += parseInt(c.value);
        });
        while (s > 21 && a > 0) { s -= 10; a--; }
        return s;
    }
</script>
</body>
</html>
