<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GEMSTONE CASINO</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --gold: #ffd700; --neon: #00d4ff; --bg: #0a0a12; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .hidden { display: none !important; }
        .panel { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin: 10px; border: 1px solid #333; }
        .card { width: 50px; height: 75px; background: white; color: black; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; margin: 4px; }
        .card.back { background: #444; color: transparent; border: 2px solid var(--gold); }
        .btn { padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-bet { background: var(--gold); }
        .btn-action { background: var(--neon); }
        #leaderboard { position: fixed; right: 10px; top: 10px; width: 180px; font-size: 0.8rem; text-align: left; }
    </style>
</head>
<body>
    <div id="auth-screen" style="margin-top: 100px;">
        <h1 style="color: var(--gold)">GEMSTONE CASINO</h1>
        <div class="panel" style="max-width: 300px; margin: auto;">
            <input id="username" placeholder="Username" style="width:90%; padding:8px; margin-bottom:10px;">
            <input id="password" type="password" placeholder="Password" style="width:90%; padding:8px; margin-bottom:10px;">
            <button class="btn btn-bet" onclick="auth()">ENTER</button>
        </div>
    </div>

    <div id="lobby" class="hidden">
        <div id="leaderboard" class="panel"><h4 style="margin:0">TOP PLAYERS</h4><div id="leaderList"></div></div>
        <h2>Welcome, <span id="userDisplay"></span>!</h2>
        <h3>Gems: <span id="gemDisplay" style="color:var(--gold)"></span> 💎</h3>
        <div class="panel">
            <input id="roomInput" placeholder="Table Name">
            <button class="btn btn-action" onclick="join(document.getElementById('roomInput').value)">OPEN TABLE</button>
            <div id="roomList" style="margin-top:15px;"></div>
        </div>
    </div>

    <div id="gameArea" class="hidden">
        <div class="panel">
            <h3 style="color:var(--gold)">THE HOUSE</h3>
            <div id="dealerCards"></div>
            <p>Dealer: <span id="dealerScore">?</span></p>
        </div>
        <h2 id="phaseMessage" style="color:var(--neon)"></h2>
        <div id="betting-controls" class="hidden">
            <button class="btn btn-bet" onclick="bet(50)">50</button>
            <button class="btn btn-bet" onclick="bet(100)">100</button>
            <button class="btn btn-bet" onclick="bet(250)">250</button>
        </div>
        <div id="action-controls" class="hidden">
            <button class="btn btn-action" onclick="hit()">HIT</button>
            <button class="btn btn-action" onclick="stand()">STAND</button>
        </div>
        <div id="players"></div>
    </div>

    <script>
        const socket = io();
        let currentRoom = "";

        function auth() {
            socket.emit('auth', { username: document.getElementById('username').value, password: document.getElementById('password').value });
        }

        socket.on('authSuccess', (data) => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('userDisplay').innerText = data.username;
            document.getElementById('gemDisplay').innerText = data.gems;
        });

        socket.on('roomList', (rooms) => {
            document.getElementById('roomList').innerHTML = rooms.map(r => `<button class="btn btn-action" onclick="join('${r}')">JOIN ${r.toUpperCase()}</button>`).join('');
        });

        socket.on('leaderboard', (list) => {
            document.getElementById('leaderList').innerHTML = list.map(u => `<div>${u.name}: ${u.gems}</div>`).join('');
        });

        function join(r) { if(!r) return; currentRoom = r; socket.emit('joinRoom', r); document.getElementById('lobby').classList.add('hidden'); document.getElementById('gameArea').classList.remove('hidden'); }
        function bet(a) { socket.emit('placeBet', { roomId: currentRoom, amount: a }); }
        function hit() { socket.emit('hit', currentRoom); }
        function stand() { socket.emit('stand', currentRoom); }

        socket.on('updateGame', (room) => {
            document.getElementById('betting-controls').classList.toggle('hidden', room.phase !== 'betting');
            document.getElementById('action-controls').classList.toggle('hidden', room.phase !== 'playing');
            document.getElementById('phaseMessage').innerText = room.phase.toUpperCase();

            let dHtml = "";
            if (room.phase === 'playing') {
                dHtml = `<div class="card">${room.dealer.hand[0].value}${room.dealer.hand[0].suit}</div><div class="card back">?</div>`;
                document.getElementById('dealerScore').innerText = "??";
            } else {
                dHtml = room.dealer.hand.map(c => `<div class="card">${c.value}${c.suit}</div>`).join('');
                document.getElementById('dealerScore').innerText = calculateScore(room.dealer.hand);
            }
            document.getElementById('dealerCards').innerHTML = dHtml;

            document.getElementById('players').innerHTML = room.players.map(p => `
                <div style="display:inline-block; margin:10px; padding:10px; border-left:3px solid var(--neon)">
                    <strong>${p.name}</strong><br>Bet: ${p.bet} | Score: ${p.score}<br>
                    ${p.hand.map(c => `<div class="card">${c.value}${c.suit}</div>`).join('')}
                </div>
            `).join('');
        });

        function calculateScore(hand) {
            let s = 0, a = 0;
            hand.forEach(c => { if (['J','Q','K'].includes(c.value)) s += 10; else if (c.value === 'A') { a++; s += 11; } else s += parseInt(c.value); });
            while (s > 21 && a > 0) { s -= 10; a--; }
            return s;
        }

        socket.on('updateBalance', (g) => { document.getElementById('gemDisplay').innerText = g; });
    </script>
</body>
</html>
